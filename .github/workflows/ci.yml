name: Executor security checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  executor-security-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout without credentials
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Run fail-closed tests
        run: bash scripts/quality-gate.sh
