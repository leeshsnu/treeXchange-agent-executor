name: Executor security checks

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  executor-security-checks:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout without credentials
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run fail-closed tests
        run: bash scripts/quality-gate.sh
